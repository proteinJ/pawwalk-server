spring:
  application:
    name: pawwalk-server

  datasource:
    # Supabase Postgres 연결 문자열로 교체 필요 (Supabase 대시보드 > Settings > Database)
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pawwalk}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate # 스키마는 Flyway가 관리, Hibernate는 엔티티-테이블 일치 여부만 검증
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production-env-var}
  access-token-validity-in-milliseconds: ${JWT_AT_VALIDITY:3600000}      # 1시간
  refresh-token-validity-in-milliseconds: ${JWT_RT_VALIDITY:604800000}  # 7일

server:
  port: ${SERVER_PORT:8080}
